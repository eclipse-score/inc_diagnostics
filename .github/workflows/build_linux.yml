name: Bazel Build (Linux)

permissions:
  contents: read
  actions: write

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

jobs:
  linux-build:
    name: Build & test on host for target platform x86_64-linux
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bazel Cache
        uses: eclipse-score/cicd-actions/setup-bazel-cache@659dcbed63f6b7fbde88c7850125ea0a0a92f939
        with:
          unique-cache-name: ${{ github.workflow }}-${{ github.job }}

      - name: Bazel Build
        run: |
          TARGETS=(//examples/... //tests/... //score/mw/...)

          bazel build --config=score_diag_x86_64_linux -- "${TARGETS[@]}"

      - name: Bazel Test
        run: |
          TARGETS=(//examples/... //tests/... //score/mw/...)

          bazel test --config=score_diag_x86_64_linux -- "${TARGETS[@]}"

      - name: Install QM native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            liblzma-dev \
            libssl-dev \
            pkg-config

      - name: Bazel Build QM diagnostics
        run: |
          bazel build --config=score_diag_x86_64_linux_qm -- \
            //score/opensovd-cda \
            //score/opensovd-gateway \
            //score/examples/sovd-client

      - name: Bazel Test QM diagnostics
        run: |
          TEST_TARGETS=()
          while IFS= read -r target; do
            TEST_TARGETS+=("${target}")
          done < <(bazel query \
            'kind(".*_test rule", //score/opensovd-cda/... + //score/opensovd-gateway/... + //score/examples/...)')

          if ((${#TEST_TARGETS[@]} == 0)); then
            echo "No QM diagnostic test targets found; build verification is covered above."
          else
            bazel test --config=score_diag_x86_64_linux_qm -- "${TEST_TARGETS[@]}"
          fi
